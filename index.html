<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moment</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <!-- 폰트어썸 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>

    <header class="w-100">
        <div class="utility_bar con">
            <div>SOUTH KOREA | KRW</div>
            <div class="top_menu">
                <span class="menu_1">JOURNAL</span>
                <span class="menu_1">BOUTIQUE</span>
            </div>
        </div>

        <!-- Main nav -->
        <div class="main_header con">
            <div class="logo">MOMENT</div>

            <!-- gnb -->
            <nav class="gnb">
                <ul>
                    <li><a href="#">New</a></li>
                    <li><a href="#">Luggage</a></li>
                    <li><a href="#">ACC</a></li>
                    <li><a href="#">Record</a></li>
                    <li><a href="#">Gift</a></li>
                    <li><a href="#">Service</a></li>
                </ul>
            </nav>

            <!-- icon -->
            <div class="holder">
                <span class="icon"><i class="fa-solid fa-magnifying-glass"></i></span>
                <span class="icon"><i class="fa-regular fa-circle-user"></i></span>
                <span class="icon"><i class="fa-regular fa-heart"></i></span>
                <span class="icon icon_cart">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span class="circle">0</span>
                </span>
            </div>
         </div>
    </header>

    <main>
        <!-- 섹션 1 -->
        <section class="hero_banner w-100">
            <div class="txt_box">
                <p>Meaningful Movement</p>
                <h2>이동과 기록,<br>그 사이의 모든 순간</h2>
                <button>Discover Collection</button>
            </div>
            <div class="arr">
                <i class="fa-solid fa-arrow-down-long"></i>
            </div>
        </section>

        <!-- 앵커 네비게이션 섹션-->
         <section class="anchor_nav w-100">
            <div class="con">
                <a href="#travel-objects">
                    <span class="anchor_line"></span>
                    <span class="anchor_name">Explore Travel Objects</span>
                </a>
                <a href="#record-objects">
                    <span class="anchor_line"></span>
                    <span class="anchor_name">Explore Record Objects</span>
                </a>
            </div>
        </section>

        <!-- 타이틀텍스트 1 -->
        <section id="travel-objects" class="con">
            <div>
                <div class="line"></div>
                <h3>Travel Objects</h3>
                <div class="line"></div>
            </div>
        </section>

    </main>
</body>
</html>
